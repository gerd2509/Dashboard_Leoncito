<form class="form mt-2" [formGroup]="form">
    <dx-date-box formControlName="fechaInicio" type="date" [openOnFieldClick]="true" label="Fecha Inicio"
        labelMode="floating" stylingMode="underlined" [displayFormat]="'dd/MM/yyyy'">
    </dx-date-box>
    <dx-date-box formControlName="fechaFin" type="date" [openOnFieldClick]="true" label="Fecha Fin" labelMode="floating"
        stylingMode="underlined" [displayFormat]="'dd/MM/yyyy'">
    </dx-date-box>
    <button mat-flat-button [disabled]="form.invalid" (click)="actualizarFiltros()">
        <mat-icon>search</mat-icon>
        Actualizar
    </button>

    <input type="file" (change)="importar($event)" accept=".xlsx, .xls" hidden #fileInput />
    <button mat-flat-button (click)="fileInput.click()">
        <mat-icon>upload</mat-icon>
        Importar
    </button>
    <button class="button" mat-flat-button (click)="exportar()">
        <mat-icon>file_download</mat-icon>
        Exportar
    </button>
</form>


<!-- Totales por mes - Porcentaje -->
<h4 class="tituloGrillas mt-2">VENTA REALZZA (%)</h4>
<dx-data-grid class="focqus-elevation mt-2" [dataSource]="totalesPorMesPorcentajeRealzza" [showBorders]="true"
    [columnAutoWidth]="true" [hoverStateEnabled]="true" [rowAlternationEnabled]="true" [wordWrapEnabled]="true"
    [selection]="{mode: 'single'}" (onCellPrepared)="onCellPrepared($event)">

    <dxi-column alignment="center" caption="Mes" dataField="Mes" dataType="string" />
    <dxi-column *ngFor="let cuota of cuotas" [caption]="cuota" [dataField]="cuota" dataType="number"
        [format]="{ type: 'percent', precision: 2 }" alignment="center" />
    <dxi-column caption="Total" dataField="Total" dataType="number" [format]="{ type: 'percent', precision: 2 }"
        alignment="center" />
</dx-data-grid>

<!-- Totales por mes - Montos -->
<h4 class="tituloGrillas mt-2">VENTA REALZZA (MONTO)</h4>
<dx-data-grid class="focqus-elevation mt-2" [dataSource]="totalesPorMesMontosRealzza" [showBorders]="true"
    [columnAutoWidth]="true" [hoverStateEnabled]="true" [rowAlternationEnabled]="true" [wordWrapEnabled]="true"
    [selection]="{mode: 'single'}" (onCellPrepared)="onCellPrepared($event)">

    <dxi-column alignment="center" caption="Mes" dataField="Mes" dataType="string" />
    <dxi-column *ngFor="let cuota of cuotas" [caption]="cuota" [dataField]="cuota" dataType="number"
        [customizeText]="customizeCurrencyText" alignment="center" />
    <dxi-column caption="Total" dataField="Total" dataType="number" [customizeText]="customizeCurrencyText"
        alignment="center" />
</dx-data-grid>

<!-- Totales por mes - Realzza -->
<h4 class="tituloGrillas mt-2">VENTA REALZZA (MONTO)</h4>
<dx-data-grid class="focqus-elevation mt-2" [dataSource]="totalesPorMesMontosRealzzaCP" [showBorders]="true"
    [columnAutoWidth]="true" [hoverStateEnabled]="true" [rowAlternationEnabled]="true" [wordWrapEnabled]="true"
    [selection]="{mode: 'single'}" (onCellPrepared)="onCellPrepared($event)">

    <dxi-column alignment="center" caption="Mes" dataField="Mes" dataType="string" />
    <dxi-column alignment="center" caption="Contact" dataField="Contact" dataType="number"
        [customizeText]="customizeCurrencyText" />
    <dxi-column alignment="center" caption="Piso" dataField="Piso" dataType="number"
        [customizeText]="customizeCurrencyText" />
    <dxi-column caption="Total" dataField="Total" dataType="number" [customizeText]="customizeCurrencyText"
        alignment="center" />
</dx-data-grid>

<!-- Totales por mes - Brila -->
<h4 class="tituloGrillas mt-2">VENTA BRILLA (MONTO)</h4>
<dx-data-grid class="focqus-elevation mt-2" [dataSource]="totalesPorMesMontosBrilla" [showBorders]="true"
    [columnAutoWidth]="true" [hoverStateEnabled]="true" [rowAlternationEnabled]="true" [wordWrapEnabled]="true"
    [selection]="{mode: 'single'}" (onCellPrepared)="onCellPrepared($event)">

    <dxi-column alignment="center" caption="Mes" dataField="Mes" dataType="string" />
    <dxi-column alignment="center" caption="Contact" dataField="Contact" dataType="number"
        [customizeText]="customizeCurrencyText" />
    <dxi-column alignment="center" caption="Piso" dataField="Piso" dataType="number"
        [customizeText]="customizeCurrencyText" />
    <dxi-column caption="Total" dataField="Total" dataType="number" [customizeText]="customizeCurrencyText"
        alignment="center" />
</dx-data-grid>
