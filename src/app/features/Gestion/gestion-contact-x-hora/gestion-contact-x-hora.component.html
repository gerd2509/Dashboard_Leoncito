<form class="form mt-2" [formGroup]="formGestion">
    <dx-date-box formControlName="fechaInicio" type="date" [openOnFieldClick]="true" label="Fecha Inicio"
        labelMode="floating" stylingMode="underlined" [displayFormat]="'dd/MM/yyyy'">
    </dx-date-box>
    <dx-date-box formControlName="fechaFin" type="date" [openOnFieldClick]="true" label="Fecha Fin" labelMode="floating"
        stylingMode="underlined" [displayFormat]="'dd/MM/yyyy'">
    </dx-date-box>
    <dx-select-box style="width: 300px;" formControlName="Asesores" [dataSource]="asesores" displayExpr="viewValue"
        valueExpr="value" label="Asesor Contact" labelMode="floating" stylingMode="underlined" placeholder=""
        (onValueChanged)="onAsesorChanged($event)" />
    <dx-check-box text="Derivación" [(value)]="filtroDerivacionActivo" [disabled]="!formGestion.valid"
        (onValueChanged)="aplicarFiltros()" stylingMode="outlined" />
    <dx-check-box text="Agendamiento" [(value)]="filtroAgendamientoActivo" [disabled]="!formGestion.valid"
        (onValueChanged)="aplicarFiltros()" stylingMode="outlined" />
    <button mat-flat-button (click)="filtrarPorFecha()">
        <mat-icon>search</mat-icon>
        Actualizar
    </button>
    <button mat-flat-button (click)="exportar()">
        <mat-icon>file_download</mat-icon>
        Exportar
    </button>
    <button mat-flat-button (click)="exportarGestion()">
        <mat-icon>summarize</mat-icon>
        Gestión
    </button>
</form>

<div class="grid-container">
    <!-- Spinner superpuesto -->
    <div class="grid-overlay" *ngIf="isLoading">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <dx-data-grid id="dataGrid" class="focqus-elevation mt-2" [dataSource]="dataFiltrada"
        [allowColumnReordering]="true"
        [showBorders]="true" [showColumnLines]="true" [showRowLines]="true" [rowAlternationEnabled]="true"
        (onCellPrepared)="onCellPrepared($event)"
        [hoverStateEnabled]="true" [wordWrapEnabled]="true"
        [columnAutoWidth]="true" [selection]="{mode: 'single'}">

        <dxo-paging [pageSize]="10"></dxo-paging>
        <dxo-pager [visible]="true" [showPageSizeSelector]="true" [allowedPageSizes]="[10, 25, 50, 100]" />
        <dxo-filter-row [visible]="showFilterRow" [applyFilter]="currentFilter" />

        <dxi-column dataField="id" [visible]="false" [allowEditing]="false" [showInColumnChooser]="false" [formItem]="{ visible: false }"></dxi-column>
        <dxi-column dataField="Marca temporal" caption="Marca temporal" [allowEditing]="false"></dxi-column>
        <dxi-column dataField="ASESOR CONTACT" caption="Asesor Contact"></dxi-column>
        <dxi-column dataField="DNI CLIENTE" caption="DNI Cliente"></dxi-column>
        <dxi-column dataField="TIPO DE CLIENTE" caption="Tipo de Cliente"></dxi-column>
        <dxi-column dataField="ESTADO DE GESTIÓN" caption="Estado de Gestión"></dxi-column>
        <dxi-column dataField="MEDIO DE PRIMER CONTACTO" caption="Medio de Contacto"></dxi-column>
        <dxi-column dataField="CELULAR GESTIONADO" caption="Celular Gestionado"></dxi-column>
        <dxi-column dataField="RESULTADO DE GESTIÓN" caption="Resultado de Gestión"></dxi-column>
        <dxi-column dataField="PRODUCTO INTERÉS" caption="Producto de Interés"></dxi-column>
        <dxi-column dataField="MOTIVO INTERÉS" caption="Motivo de Interés"></dxi-column>
        <dxi-column dataField="MOTIVO NO INTERÉS" caption="Motivo no Interés"></dxi-column>
        <dxi-column dataField="FECHA DE INTERÉS AGENDAMIENTO" caption="Fecha de Interés"></dxi-column>
        <dxi-column dataField="HORA APROXIMADA INTERÉS AGENDAMIENTO" caption="Hora Aproximada de Interés"></dxi-column>
        <dxi-column dataField="SEDE" caption="Sede"></dxi-column>

        <!-- Campos ocultos en la tabla, pero completos y editables en el popup -->
        <dxi-column dataField="KOMMO" caption="Kommo" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="MOTIVO NO CONTACTO" caption="Motivo No Contacto" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="MOTIVO AGENDAMIENTO" caption="Motivo Agendamiento" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="COMENTARIO ADICIONAL AGENDAMIENTO" caption="Comentario Agendamiento" [visible]="false" [formItem]="{ visible: true, colSpan: 2 }"></dxi-column>
        <dxi-column dataField="FECHA DE INTERÉS DERIVACIÓN" caption="Fecha Derivación" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="HORA APROXIMADA INTERÉS DERIVACIÓN" caption="Hora Derivación" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="COMENTARIO ADICIONAL DERIVACIÓN" caption="Comentario Derivación" [visible]="false" [formItem]="{ visible: true, colSpan: 2 }"></dxi-column>
        <dxi-column dataField="COMENTARIO ADICIONAL NO INTERES" caption="Comentario No Interés" [visible]="false" [formItem]="{ visible: true, colSpan: 2 }"></dxi-column>
        <dxi-column dataField="MOTIVO NO ATENDIBLE" caption="Motivo No Atendible" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="COMENTARIO ADICIONAL NO ATENDIBLE" caption="Comentario No Atendible" [visible]="false" [formItem]="{ visible: true, colSpan: 2 }"></dxi-column>
        <dxi-column dataField="MOTIVOS TERCERO RELACIONADO" caption="Motivos Tercero" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="FECHA DE RE-LLAMADA" caption="Fecha Re-llamada" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="HORA DE RELLAMADA" caption="Hora Re-llamada" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="NÚMERO TITULAR ACTUAL" caption="Número Titular" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="MOTIVO DE NO CIERRE" caption="Motivo No Cierre" [visible]="false" [formItem]="{ visible: true }"></dxi-column>
        <dxi-column dataField="COMENTARIO VENTA NO CONCRETADA" caption="Comentario Venta No Concretada" [visible]="false" [formItem]="{ visible: true, colSpan: 2 }"></dxi-column>

        <dxo-summary>
            <dxi-total-item [alignment]="'right'" column="Marca temporal" summaryType="count"
                displayFormat="Registros: {0}"></dxi-total-item>
        </dxo-summary>
    </dx-data-grid>
</div>

<!-- NUEVO: Grid “oculto” para exportar la tabla de Gestión -->
<dx-data-grid #gridGestion id="gridGestion" class="focqus-elevation" [dataSource]="tablaGestion"
    [columns]="columnasGestion" [showBorders]="true" [visible]="false">
</dx-data-grid>
