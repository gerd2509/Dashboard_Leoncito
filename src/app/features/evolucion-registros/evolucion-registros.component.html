<div class="ev-wrap">

    <!-- Controles -->
    <form class="ev-form" [formGroup]="formCtrl">
        <dx-date-box formControlName="desde" type="date" label="Desde" labelMode="floating"
            stylingMode="underlined" [displayFormat]="'dd/MM/yyyy'"></dx-date-box>
        <dx-date-box formControlName="hasta" type="date" label="Hasta" labelMode="floating"
            stylingMode="underlined" [displayFormat]="'dd/MM/yyyy'"></dx-date-box>
        <dx-select-box formControlName="sede" [dataSource]="sedeOptions" valueExpr="value" displayExpr="label"
            label="Sede" labelMode="floating" stylingMode="underlined" [width]="220"></dx-select-box>
        <button mat-flat-button type="button" (click)="actualizar()" [disabled]="isLoading">
            <mat-icon>{{ isLoading ? 'hourglass_empty' : 'insights' }}</mat-icon>
            {{ isLoading ? 'Cargando...' : 'Actualizar' }}
        </button>
    </form>

    <!-- KPIs -->
    <div class="ev-kpis" *ngIf="!isLoading">
        <div class="ev-kpi"><span class="ev-kpi-num">{{ totalRango }}</span><span class="ev-kpi-lbl">TOTAL RANGO</span></div>
        <div class="ev-kpi"><span class="ev-kpi-num">{{ promedioDia }}</span><span class="ev-kpi-lbl">PROMEDIO / DÍA</span></div>
        <div class="ev-kpi"><span class="ev-kpi-num">{{ maxDia }}</span><span class="ev-kpi-lbl">MÁXIMO / DÍA</span></div>
    </div>

    <!-- Gráfico de líneas -->
    <div class="ev-card">
        <div class="ev-card-head">
            <mat-icon>show_chart</mat-icon>
            <span class="ev-titulo">Gestiones reales por día — {{ tituloSerie }}</span>
            <button mat-icon-button type="button" class="ev-expand" (click)="popupVisible = true" matTooltip="Ampliar">
                <mat-icon>open_in_full</mat-icon>
            </button>
        </div>

        <div *ngIf="isLoading" class="ev-loading">Cargando…</div>

        <dx-chart *ngIf="!isLoading" [dataSource]="puntos" [redrawOnResize]="true" class="ev-chart">
            <dxo-common-series-settings argumentField="fecha" type="line">
                <dxo-point [visible]="true" [size]="6"></dxo-point>
                <!-- Número visible en cada punto (siempre, también con varias líneas) -->
                <dxo-label [visible]="true">
                    <dxo-font [size]="11"></dxo-font>
                </dxo-label>
            </dxo-common-series-settings>

            <!-- Una serie (línea) por sede, con su color fijo -->
            <dxi-series *ngFor="let s of seriesActivas" [valueField]="s.key" [name]="s.nombre" [color]="s.color"></dxi-series>

            <dxo-argument-axis>
                <dxo-label [overlappingBehavior]="'rotate'" [rotationAngle]="-45"></dxo-label>
            </dxo-argument-axis>
            <dxo-value-axis [allowDecimals]="false">
                <dxo-title text="N° de gestiones (DNIs)"></dxo-title>
            </dxo-value-axis>

            <dxo-tooltip [enabled]="true"></dxo-tooltip>
            <dxo-legend [visible]="multiSerie" verticalAlignment="bottom" horizontalAlignment="center"></dxo-legend>
        </dx-chart>

        <div *ngIf="!isLoading && totalRango === 0" class="ev-vacio">
            <mat-icon>info</mat-icon> No hay gestiones registradas en el rango/sede seleccionados.
        </div>
    </div>

    <!-- Popup: gráfico ampliado -->
    <dx-popup [(visible)]="popupVisible" [showTitle]="true" [title]="'Gestiones reales por día — ' + tituloSerie"
        [dragEnabled]="false" [hideOnOutsideClick]="true" [showCloseButton]="true" width="92%" height="88%">
        <div *dxTemplate="let d of 'content'" class="ev-chart-popup">
            <dx-chart [dataSource]="puntos" [redrawOnResize]="true" class="ev-chart-popup">
                <dxo-common-series-settings argumentField="fecha" type="line">
                    <dxo-point [visible]="true" [size]="7"></dxo-point>
                    <dxo-label [visible]="true"><dxo-font [size]="12"></dxo-font></dxo-label>
                </dxo-common-series-settings>
                <dxi-series *ngFor="let s of seriesActivas" [valueField]="s.key" [name]="s.nombre" [color]="s.color"></dxi-series>
                <dxo-argument-axis>
                    <dxo-label [overlappingBehavior]="'rotate'" [rotationAngle]="-45"></dxo-label>
                </dxo-argument-axis>
                <dxo-value-axis [allowDecimals]="false">
                    <dxo-title text="N° de gestiones (DNIs)"></dxo-title>
                </dxo-value-axis>
                <dxo-tooltip [enabled]="true"></dxo-tooltip>
                <dxo-legend [visible]="multiSerie" verticalAlignment="bottom" horizontalAlignment="center"></dxo-legend>
            </dx-chart>
        </div>
    </dx-popup>

</div>
