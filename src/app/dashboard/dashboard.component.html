<div class="dashboard-container" [class.menu-hidden]="!sidebarVisible" [class.is-mobile]="isMobile">

  <!-- Fondo oscuro del drawer (solo móvil, al abrir el menú) -->
  <div class="sidebar-backdrop" *ngIf="isMobile && sidebarVisible" (click)="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="!sidebarVisible">

    <!-- Encabezado: marca animada (Leoncito / Realzza según el usuario) -->
    <div class="sidebar-brand" [style.--brand-rgb]="brand.rgb">
      <app-lion-icon class="sb-emoji" [variant]="brand.id"></app-lion-icon>
      <span class="sb-name" *ngIf="sidebarVisible">
        <span class="sb-letter" *ngFor="let l of brand.nombre.split(''); let i = index"
              [style.animation-delay]="(i * 0.07) + 's'">{{ l }}</span>
      </span>
    </div>

    <div class="sidebar-content">

      <!-- Menú filtrado por sede/rol -->
      <ng-container *ngFor="let item of menuItemsVisibles">
        <div *ngIf="item.submenu; else simpleItem" class="menu-group">
          <button class="menu-main" (click)="toggleSubmenu(item.label)">
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
            <mat-icon class="arrow" [class.open]="submenuAbierto === item.label">expand_more</mat-icon>
          </button>

          <div class="submenu" [class.open]="submenuAbierto === item.label">
            <button *ngFor="let sub of item.submenu" (click)="selectModule(sub.modulo)">
              <mat-icon>{{ sub.icon }}</mat-icon>
              <span>{{ sub.label }}</span>
            </button>
          </div>
        </div>

        <ng-template #simpleItem>
          <button class="menu-main" (click)="selectModuleRaiz(item.modulo)">
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </button>
        </ng-template>
      </ng-container>

    </div>

    <!-- 🦁 Mascota Leoncito: escenario animado (anillos + resplandor + estrellas + R + confeti) -->
    <div class="sidebar-mascota" *ngIf="sidebarVisible">
      <div class="lion-stage" [class.celebrando]="celebrando" [style.--leon-rgb]="brand.rgb">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>

        <!-- chispas titilantes -->
        <span class="spark sp1"></span>
        <span class="spark sp2"></span>
        <span class="spark sp3"></span>
        <span class="spark sp4"></span>

        <!-- círculo + mascota de la marca + inicial del usuario -->
        <div class="lion-circle">
          <app-lion-icon class="lion-emoji" [variant]="brand.id"></app-lion-icon>
          <span class="lion-inicial">{{ inicial }}</span>
        </div>

        <!-- estrellas + R (solo marca Realzza) orbitando -->
        <span class="orbit-star s1">✦</span>
        <span class="orbit-star s2">✦</span>
        <span class="orbit-star s3">✦</span>
        <span class="orbiter" *ngIf="brand.id === 'realzza'"><span class="orbit-r">R</span></span>

        <!-- confeti (solo visible al celebrar) -->
        <span class="confetti c1"></span>
        <span class="confetti c2"></span>
        <span class="confetti c3"></span>
        <span class="confetti c4"></span>
        <span class="confetti c5"></span>
        <span class="confetti c6"></span>
      </div>
      <div class="mascota-frase">{{ frase }}</div>
    </div>
  </aside>

  <!-- Panel botón -->
  <div class="toggle-panel" [class.hidden]="!sidebarVisible" (click)="toggleSidebar()">
    <button class="toggle-sidebar-btn">
      <mat-icon>{{ sidebarVisible ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>
  </div>

  <!-- Contenido principal -->
  <div class="main-content">
    <header class="topbar">
      <button class="hamburger" (click)="toggleSidebar()" aria-label="Menú">
        <mat-icon>menu</mat-icon>
      </button>
      <div class="titulo-modulo">{{ getTituloModulo() }}</div>
      <div class="topbar-user">
        <mat-icon>account_circle</mat-icon>
        <span class="user-nombre">{{ usuario?.nombre }}</span>
        <span class="user-sede" *ngIf="usuario?.sede !== 'todas'">{{ usuario?.sede | uppercase }}</span>
        <button class="btn-logout" (click)="logout()" title="Cerrar sesión">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </header>

    <section class="contenido">
      <ng-container [ngSwitch]="moduloSeleccionado">
        <app-agendamientos               *ngSwitchCase="'agendamientos'"></app-agendamientos>
        <app-agendamientos-campo         *ngSwitchCase="'agendamientos-campo'"></app-agendamientos-campo>
        <app-agendamientos-kommo         *ngSwitchCase="'agendamientos-kommo'"></app-agendamientos-kommo>
        <app-agendamientos-sedes         *ngSwitchCase="'agendamientos-sedes'"></app-agendamientos-sedes>
        <app-gestion-contact-x-hora      *ngSwitchCase="'gestion'"></app-gestion-contact-x-hora>
        <app-gestion-campo-realzza       *ngSwitchCase="'gestion-campo'"></app-gestion-campo-realzza>
        <app-gestion-post-venta          *ngSwitchCase="'gestion-post-venta'"></app-gestion-post-venta>
        <app-gestion-kommo               *ngSwitchCase="'gestion-kommo'"></app-gestion-kommo>
        <app-gestion-sede                *ngSwitchCase="'gestion-sede'"></app-gestion-sede>
        <app-gestion-call-sedes          *ngSwitchCase="'gestion-call-sedes'"></app-gestion-call-sedes>
        <app-cierre-gestion              *ngSwitchCase="'cierre'"></app-cierre-gestion>
        <app-ventas                      *ngSwitchCase="'ventas'"></app-ventas>
        <app-ventas-campo                *ngSwitchCase="'ventas-campo'"></app-ventas-campo>
        <app-ventas-sedes                *ngSwitchCase="'ventas-sedes'"></app-ventas-sedes>
        <app-comparativo-ventas          *ngSwitchCase="'ventas-comparativo'"></app-comparativo-ventas>
        <app-evolucion-tipo-cliente      *ngSwitchCase="'evolucion-tipo-cliente'"></app-evolucion-tipo-cliente>
        <app-venta-x-plazo-av            *ngSwitchCase="'ventas-plazo-av'"></app-venta-x-plazo-av>
        <app-convertidor-excel-csv       *ngSwitchCase="'conversor-csv'"></app-convertidor-excel-csv>
        <app-limpieza-bbdd               *ngSwitchCase="'limpieza-bbdd'"></app-limpieza-bbdd>
        <app-gps-ruta                    *ngSwitchCase="'gps-ruta'"></app-gps-ruta>
        <app-post-venta                  *ngSwitchCase="'post-venta'"></app-post-venta>
        <app-control-gestion-sede        *ngSwitchCase="'control-gestion-sede'"></app-control-gestion-sede>
        <app-control-call-sedes          *ngSwitchCase="'control-call-sedes'"></app-control-call-sedes>
        <app-evolucion-registros         *ngSwitchCase="'evolucion-registros'"></app-evolucion-registros>
        <app-mi-panel                    *ngSwitchCase="'mi-panel'"></app-mi-panel>
        <app-pizarra-metas               *ngSwitchCase="'pizarra-metas'"></app-pizarra-metas>
        <app-avance-cartera              *ngSwitchCase="'avance-cartera'"></app-avance-cartera>
        <app-embudos-gestion             *ngSwitchCase="'embudos-gestion'"></app-embudos-gestion>
        <app-registro-gestion            *ngSwitchCase="'registro-gestion'"></app-registro-gestion>
        <app-registro-supervisor         *ngSwitchCase="'registro-supervisor'"></app-registro-supervisor>
        <app-control-supervisor          *ngSwitchCase="'control-supervisor'"></app-control-supervisor>
        <app-gestion-supervisor          *ngSwitchCase="'gestion-supervisor'"></app-gestion-supervisor>
        <app-comparativo-cartera-ventas  *ngSwitchCase="'comparativo-cartera-ventas'"></app-comparativo-cartera-ventas>
        <app-carga-ventas                *ngSwitchCase="'carga-ventas'"></app-carga-ventas>
        <app-seguridad                   *ngSwitchCase="'seguridad'"></app-seguridad>
      </ng-container>
    </section>
  </div>
</div>
