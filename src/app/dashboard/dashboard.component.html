<div class="dashboard-container" [class.menu-hidden]="!sidebarVisible">

  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="!sidebarVisible">
    <div class="sidebar-content">

      <!-- 🔹 Menú generado dinámicamente -->
      <ng-container *ngFor="let item of menuItems">
        <div *ngIf="item.submenu; else simpleItem" class="menu-group">
          <button class="menu-main" (click)="toggleSubmenu(item.label)">
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
            <mat-icon class="arrow" [class.open]="submenuAbierto === item.label">expand_more</mat-icon>
          </button>

          <div class="submenu" [class.open]="submenuAbierto === item.label">
            <button *ngFor="let sub of item.submenu" (click)="selectModule(sub.modulo)">
              <mat-icon>{{ sub.icon }}</mat-icon>
              <span>{{ sub.label }}</span>
            </button>
          </div>
        </div>

        <ng-template #simpleItem>
          <button class="menu-main" (click)="selectModule(item.modulo)">
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </button>
        </ng-template>
      </ng-container>

    </div>
  </aside>

  <!-- Panel botón -->
  <div class="toggle-panel" [class.hidden]="!sidebarVisible" (click)="toggleSidebar()">
    <button class="toggle-sidebar-btn">
      <mat-icon>{{ sidebarVisible ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>
  </div>

  <!-- Contenido principal -->
  <div class="main-content">
    <header class="topbar">
      <div class="titulo-modulo">{{ getTituloModulo() }}</div>
    </header>

    <section class="contenido">
      <app-agendamientos *ngIf="moduloSeleccionado === 'agendamientos'"></app-agendamientos>
      <app-agendamientos-campo *ngIf="moduloSeleccionado === 'agendamientos-campo'"></app-agendamientos-campo>
      <app-agendamientos-kommo *ngIf="moduloSeleccionado === 'agendamientos-kommo'"></app-agendamientos-kommo>
      <app-terceros *ngIf="moduloSeleccionado === 'terceros'"></app-terceros>
      <app-gestion-contact-x-hora *ngIf="moduloSeleccionado === 'gestion'"></app-gestion-contact-x-hora>
      <app-gestion-campo-realzza *ngIf="moduloSeleccionado === 'gestion-campo'"></app-gestion-campo-realzza>
      <app-gestion-post-venta *ngIf="moduloSeleccionado === 'gestion-post-venta'"></app-gestion-post-venta>
      <app-gestion-kommo *ngIf="moduloSeleccionado === 'gestion-kommo'"></app-gestion-kommo>
      <app-cierre-gestion *ngIf="moduloSeleccionado === 'cierre'"></app-cierre-gestion>
      <app-analisis-gestion-mensual *ngIf="moduloSeleccionado === 'analisis'"></app-analisis-gestion-mensual>
      <app-ventas *ngIf="moduloSeleccionado === 'ventas'"></app-ventas>
      <app-ventas-campo *ngIf="moduloSeleccionado === 'ventas-campo'"></app-ventas-campo>
      <app-comparativo-ventas *ngIf="moduloSeleccionado === 'ventas-comparativo'"></app-comparativo-ventas>
      <app-evolucion-tipo-cliente *ngIf="moduloSeleccionado === 'evolucion-tipo-cliente'"></app-evolucion-tipo-cliente>
      <app-ventas-brilla-realzza *ngIf="moduloSeleccionado === 'ventas-brilla-realzza'"></app-ventas-brilla-realzza>
      <app-ventas-cuotas-tipo-venta *ngIf="moduloSeleccionado === 'ventas-cuotas-tipoVenta'"></app-ventas-cuotas-tipo-venta>
      <app-venta-x-plazo-av *ngIf="moduloSeleccionado === 'ventas-plazo-av'"></app-venta-x-plazo-av>
      <app-proyeccion-comparativo *ngIf="moduloSeleccionado === 'proyeccion-comparativo'"></app-proyeccion-comparativo>
      <app-proyeccion-ffvv-campo *ngIf="moduloSeleccionado === 'proyeccion-comparativo-campo'"></app-proyeccion-ffvv-campo>
      <app-gestion-cobranzas *ngIf="moduloSeleccionado === 'cobranzas'"></app-gestion-cobranzas>
      <app-convertidor-excel-csv *ngIf="moduloSeleccionado === 'conversor-csv'"></app-convertidor-excel-csv>
      <app-post-venta *ngIf="moduloSeleccionado === 'post-venta'"></app-post-venta>
    </section>
  </div>
</div>
